<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>
     <!-- tailwind and DaisyUI -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>

 <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- google font -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
 <!-- style css -->
  <style>
    *{
          font-family: "Geist", sans-serif;
    }
  </style>

</head>

<body class="bg-gray-100">

  <!-- Navbar -->
<nav class="bg-white shadow px-8 flex h-20 justify-between items-center">

  <!-- Left Side -->
  <div class="flex items-center gap-2">
    <img class="w-12 h-auto" src="./assets/github-logo.png" alt="">
    <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
  </div>

  <!-- Right Side -->
  <div class="flex items-center gap-3">

    <!-- Search Input -->
    <div class="relative">
      <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

      <input
        id="searchInput"
        type="text"
        placeholder="Search issues..."
        class="input input-bordered w-64 pl-10"
      >
    </div>

    <!-- Button -->
    <button onclick="handleSearch()" class="btn btn-primary">
      <i class="fa-solid fa-magnifying-glass"></i>
      Search
    </button>
  </div>
</nav>

   
<!-- Main Container -->
<main>
   <section class="w-11/12 mx-auto mt-10 p-6 flex gap-2 bg-white rounded shadow mb-5">
  <button class="btn all-btn btn-primary" data-status="all" onclick="filterIssues('all')">All</button>
  <button class="btn all-btn btn-white" data-status="open" onclick="filterIssues('open')">Open</button>
  <button class="btn all-btn btn-white" data-status="closed" onclick="filterIssues('closed')">Closed</button>
</section>

    <section class="w-11/12 mx-auto bg-white p-6 rounded shadow mb-6">
       <div class="flex justify-between items-center">
        <div class="flex gap-3 items-center">
          <img src="./assets/Aperture.png" alt="" class="w-8 h-8">
      <div>
           <h3 id="issueCount" class="font-bold text-lg text-gray-800">0 Issues</h3>
           <p class="text-sm text-gray-500">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex gap-4">
        <div class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Open</div>
          <div class="flex items-center gap-1"><span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed</div>
      </div>
        </div>
    </section>

    <section id="issuesContainer" class="w-11/12 mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
        </section>
</main>


   <!-- Modal -->
<dialog id="issueModal" class="modal">
  <div class="modal-box w-11/12 max-w-2xl">
    <div id="modalContent"></div>
  </div>
</dialog>
    

<script src="./script/home.js"></script>

</body>
</html>
